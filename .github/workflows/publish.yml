name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC).
      # GitHub mints a short-lived OIDC token that npm validates
      # against the trusted publisher registered on npmjs.com.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1.
      # Node 22 ships with an older npm; bump before publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --provenance --access public
