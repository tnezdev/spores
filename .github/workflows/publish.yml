name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC).
      # GitHub mints a short-lived OIDC token that npm validates
      # against the trusted publisher registered on npmjs.com.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1.
      # Bootstrap npm 11 via direct tarball download — avoids using the
      # runner's bundled npm (which can be corrupt on fresh ubuntu-latest images).
      - name: Bootstrap npm 11
        run: |
          TMP=$(mktemp -d)
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.5.1.tgz | tar -xz --strip-components=1 -C "$TMP"
          node "$TMP/bin/npm-cli.js" install -g "$TMP"
          npm --version

      - name: Publish
        run: npm publish --provenance --access public
